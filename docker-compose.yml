services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: browser_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    command: sh -c "composer install --no-interaction && php-fpm"

  nginx:
    image: nginx:1.27-alpine
    container_name: browser_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: browser_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: browser
      MYSQL_USER: browser
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - browser_mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

volumes:
  browser_mysql_data:
